<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="student-card">
        <div class="card-header">
            <span class="badge">Student ID</span>
            <h3>Web Project</h3>
        </div>
        <div class="photos">
            <a href="https://www.google.com/" class="photo-link">
                <img src="https://randomuser.me/api/portraits/men/85.jpg" alt="Student Photo">
            </a>
        </div>
        <div class="info">
            <div class="info-item">
                <h2>Adam</h2>
            </div>
            <div class="info-item">
                <span class="label">ID:</span>
                <p>232321</p>
            </div>
            <div class="info-item">
                <span class="label">Role:</span>
                <p>Student</p>
            </div>
        </div>
        <div class="card-footer">
            <button class="action-btn">View Profile</button>
        </div>
    </div>
</body>
</html>
